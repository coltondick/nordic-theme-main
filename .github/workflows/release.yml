name: Publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate YAML and formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check for manual release notes
        run: |
          NOTES_FILE="release-notes/${GITHUB_REF_NAME}.md"

          if [[ -f "$NOTES_FILE" ]]; then
            echo "Manual release notes found: $NOTES_FILE"
          else
            echo "::notice::No manual release notes found at $NOTES_FILE. GitHub-generated notes will be used."
          fi

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Check YAML syntax and duplicate keys
        run: |
          yamllint .

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Prettier
        run: |
          npm install --no-save prettier

      - name: Check formatting
        run: |
          npx prettier . --check

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="release-notes/${GITHUB_REF_NAME}.md"

          if [[ -f "$NOTES_FILE" ]]; then
            echo "Using manual release notes: $NOTES_FILE"

            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "$NOTES_FILE" \
              --verify-tag
          else
            echo "Using GitHub-generated release notes"

            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi
